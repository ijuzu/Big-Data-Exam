version: '3.8'
services:
  ais-collision:
    build: .
    container_name: ais_collision_detection
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output
    environment:
      - OUTPUT_DIR=/app/output

    command: >
      spark-submit
      --master local[*]
      --driver-memory 4g
      --conf spark.sql.shuffle.partitions=50
      /app/src/main.py
      "/app/data/raw/extracted/aisdk-2021-12-01.csv"

    # ── Full-month run (uncomment, comment out the block above) ───────────────
